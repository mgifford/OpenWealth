name: CI

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/**"
      - "kitty-specs/**"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/**"
      - "kitty-specs/**"

jobs:
  quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Schema smoke tests
        run: npm run test:schema

      - name: Unit smoke tests
        run: npm run test:unit

      - name: Integration tests
        run: npm run test:integration

      - name: Regression tests
        run: npm run test:regression

      - name: Build
        run: npm run build

      - name: CI summary
        if: success()
        run: |
          {
            echo "## CI Quality Gates";
            echo "- lint: pass";
            echo "- schema: pass";
            echo "- unit: pass";
            echo "- integration: pass";
            echo "- regression: pass";
            echo "- build: pass";
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Failure annotation
        if: failure()
        run: |
          echo "::error title=CI quality gates failed::One or more lint/test/build checks failed."

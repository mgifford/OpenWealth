name: Public Data Refresh

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build baseline dist
        run: npm run build

      - name: Refresh public datasets
        run: npm run data:refresh

      - name: Upload refresh artifacts
        uses: actions/upload-artifact@v4
        with:
          name: public-data-refresh-${{ github.run_number }}
          path: dist/data-refresh
          retention-days: 14
          if-no-files-found: error

      - name: Refresh summary
        if: success()
        run: |
          {
            echo "## Public Data Refresh";
            echo "- output: dist/data-refresh";
            echo "- artifact: public-data-refresh-${{ github.run_number }}";
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Failure annotation
        if: failure()
        run: |
          echo "::error title=Public data refresh failed::Dataset refresh or artifact upload failed."

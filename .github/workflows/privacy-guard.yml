name: Privacy Guard

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  guard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build artifacts
        run: npm run build

      - name: Run artifact guard
        run: npm run privacy:guard

      - name: Guard summary
        if: success()
        run: |
          {
            echo "## Privacy Guard";
            echo "- checked: dist";
            echo "- result: pass";
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Failure annotation
        if: failure()
        run: |
          echo "::error title=Privacy guard failed::Forbidden path or sensitive content pattern detected in artifacts."

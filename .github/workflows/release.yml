name: Release Packaging

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Generate batch artifacts
        run: npm run batch:scenarios

      - name: Privacy guard
        run: npm run privacy:guard

      - name: Package release outputs
        run: npm run release:package

      - name: Upload release package artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-package-${{ github.ref_name }}
          path: dist/release
          retention-days: 30

      - name: Release summary
        if: success()
        run: |
          {
            echo "## Release Packaging";
            echo "- ref: ${{ github.ref_name }}";
            echo "- artifact: release-package-${{ github.ref_name }}";
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/release-manifest.json
            dist/release/CHANGELOG_AUTOGEN.md
          body_path: dist/release/CHANGELOG_AUTOGEN.md

      - name: Failure annotation
        if: failure()
        run: |
          echo "::error title=Release packaging failed::Release bundle generation or upload failed."
